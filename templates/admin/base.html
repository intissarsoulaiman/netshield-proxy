<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NetShield {% block title %}{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0b0f14;
      --surface:   #111720;
      --surface2:  #18222f;
      --border:    #1e2d3d;
      --accent:    #00d4ff;
      --accent2:   #00ffaa;
      --danger:    #ff4e6a;
      --warn:      #ffb547;
      --text:      #d4e6f1;
      --muted:     #5a7a94;
      --mono:      'Share Tech Mono', monospace;
      --sans:      'DM Sans', sans-serif;
      --radius:    6px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      min-height: 100vh;
      display: flex;
    }

    /* ── Sidebar ── */
    .sidebar {
      width: 220px;
      min-height: 100vh;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      position: fixed;
      top: 0; left: 0; bottom: 0;
    }

    .sidebar-logo {
      padding: 24px 20px 20px;
      border-bottom: 1px solid var(--border);
    }

    .sidebar-logo .wordmark {
      font-family: var(--mono);
      font-size: 15px;
      color: var(--accent);
      letter-spacing: 0.08em;
    }

    .sidebar-logo .sub {
      font-size: 10px;
      color: var(--muted);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    nav { flex: 1; padding: 16px 0; }

    nav a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.02em;
      border-left: 3px solid transparent;
      transition: all 0.15s;
    }

    nav a:hover { color: var(--text); background: var(--surface2); }

    nav a.active {
      color: var(--accent);
      border-left-color: var(--accent);
      background: rgba(0, 212, 255, 0.05);
    }

    nav a .icon { font-size: 16px; opacity: 0.8; }

    .sidebar-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
    }

    .status-dot {
      display: inline-block;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 6px var(--accent2);
      animation: pulse 2s infinite;
      margin-right: 5px;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* ── Main ── */
    .main {
      margin-left: 220px;
      flex: 1;
      padding: 32px 36px;
      max-width: 1200px;
    }

    .page-header {
      margin-bottom: 28px;
    }

    .page-header h1 {
      font-size: 22px;
      font-weight: 600;
      color: var(--text);
      letter-spacing: -0.01em;
    }

    .page-header p {
      color: var(--muted);
      margin-top: 4px;
      font-size: 13px;
    }

    /* ── Cards ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px 24px;
    }

    .card-label {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }

    .card-value {
      font-family: var(--mono);
      font-size: 28px;
      color: var(--accent);
    }

    .card-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 4px;
    }

    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

    /* ── Table ── */
    .table-wrap {
      overflow-x: auto;
      border-radius: var(--radius);
      border: 1px solid var(--border);
    }

    table { width: 100%; border-collapse: collapse; }

    thead { background: var(--surface2); }

    th {
      padding: 10px 14px;
      text-align: left;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 400;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 12.5px;
      color: var(--text);
      vertical-align: middle;
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(255,255,255,0.02); }

    .mono { font-family: var(--mono); font-size: 12px; }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      font-weight: 400;
    }

    .badge-blocked { background: rgba(255,78,106,0.15); color: var(--danger); }
    .badge-ok      { background: rgba(0,255,170,0.1);  color: var(--accent2); }
    .badge-error   { background: rgba(255,181,71,0.15); color: var(--warn); }
    .badge-get     { background: rgba(0,212,255,0.1);  color: var(--accent); }
    .badge-post    { background: rgba(160,110,255,0.12); color: #a06eff; }

    /* ── Buttons ── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 14px;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid transparent;
      text-decoration: none;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .btn-primary:hover { background: #00b8d9; }

    .btn-danger {
      background: rgba(255,78,106,0.15);
      color: var(--danger);
      border-color: rgba(255,78,106,0.3);
    }

    .btn-danger:hover { background: rgba(255,78,106,0.25); }

    .btn-ghost {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
    }

    .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

    /* ── Forms ── */
    .input-row {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    input[type="text"] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: var(--radius);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      flex: 1;
      transition: border-color 0.15s;
    }

    input[type="text"]:focus { border-color: var(--accent); }
    input[type="text"]::placeholder { color: var(--muted); }

    select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 12px;
      border-radius: var(--radius);
      font-size: 13px;
      outline: none;
    }

    /* ── Progress bar ── */
    .bar-bg {
      height: 6px;
      background: var(--surface2);
      border-radius: 99px;
      margin-top: 10px;
    }

    .bar-fill {
      height: 100%;
      border-radius: 99px;
      background: var(--accent);
      transition: width 0.4s;
    }

    /* ── Section title ── */
    .section-title {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin: 28px 0 12px;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 12px;
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="wordmark">◈ NETSHIELD</div>
    <div class="sub">Admin Console</div>
  </div>

  <nav>
    <a href="{{ url_for('dashboard') }}" class="{{ 'active' if request.endpoint == 'dashboard' }}">
      <span class="icon">⬡</span> Dashboard
    </a>
    <a href="{{ url_for('logs') }}" class="{{ 'active' if request.endpoint == 'logs' }}">
      <span class="icon">≡</span> Logs
    </a>
    <a href="{{ url_for('cache_view') }}" class="{{ 'active' if request.endpoint == 'cache_view' }}">
      <span class="icon">◻</span> Cache
    </a>
    <a href="{{ url_for('filters') }}" class="{{ 'active' if request.endpoint == 'filters' }}">
      <span class="icon">⊘</span> Filters
    </a>
  </nav>

  <div class="sidebar-footer">
    <span class="status-dot"></span> Proxy Online<br>
    127.0.0.1:8080
  </div>
</aside>

<main class="main">
  {% block content %}{% endblock %}
</main>

</body>
</html>
